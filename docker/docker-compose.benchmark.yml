# Benchmark overlay — layers on top of the base docker-compose.yml
# Does NOT require docker-compose.dev.yml
#
# Usage:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.benchmark.yml --env-file .env.benchmark up -d
#
# Pulls pre-built images from ghcr.io (the base compose's image refs); no local build.
# Starts: postgres, redis, migrator, searcher, indexer, ai
# Embeddings (TEI), connectors, web, caddy, docling, sandbox are gated behind profiles.
# v0 uses a cloud embedding provider (seeded by enterprise-benchmark/load_corpus.py).

x-benchmark-db: &benchmark-db
  DATABASE_HOST: postgres
  DATABASE_PORT: 5432
  DATABASE_USERNAME: omni_bench
  DATABASE_PASSWORD: omni_bench_password
  DATABASE_NAME: omni_benchmark

services:
  postgres:
    container_name: omni-postgres-benchmark
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_benchmark_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: omni_benchmark
      POSTGRES_USER: omni_bench
      POSTGRES_PASSWORD: omni_bench_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omni_bench -d omni_benchmark"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: omni-redis-benchmark
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_benchmark_data:/data

  # Use locally-built :local images for services with benchmark-specific code changes.
  migrator:
    image: omni-migrator:local
    environment:
      <<: *benchmark-db

  searcher:
    image: omni-searcher:local
    ports:
      - "127.0.0.1:${SEARCHER_PORT}:${SEARCHER_PORT}"
    environment:
      <<: *benchmark-db
      RUST_LOG: debug

  indexer:
    image: omni-indexer:local
    ports:
      - "127.0.0.1:${INDEXER_PORT}:${INDEXER_PORT}"
    environment:
      <<: *benchmark-db
      RUST_LOG: info

  ai:
    image: omni-ai:local
    ports:
      - "127.0.0.1:${AI_SERVICE_PORT}:${AI_SERVICE_PORT}"
    environment:
      <<: *benchmark-db
      MAX_CONVERSATION_INPUT_TOKENS: ${MAX_CONVERSATION_INPUT_TOKENS:-256000}

  # Disable services not needed for benchmarks
  # Connectors are already gated by their own profiles (google, slack, etc.)
  # and won't start unless explicitly activated.
  # Embeddings (TEI) stays disabled — v0 uses a cloud embedding provider seeded
  # by enterprise-benchmark/load_corpus.py to keep RAM/CPU available on small VPS hosts.
  embeddings:
    profiles: [local-embeddings]
  web:
    profiles: [full]
  connector-manager:
    profiles: [full]
  caddy:
    profiles: [full]
  docling:
    profiles: [full]
  sandbox:
    profiles: [full]

volumes:
  postgres_benchmark_data:
    name: omni-postgres-benchmark-data 
  redis_benchmark_data:
    name: omni-redis-benchmark-data 
