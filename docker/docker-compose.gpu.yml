# GPU support override for local inference services (llama.cpp, TEI)
#
# Layer on top of docker-compose.yml (for TEI only) or together with
# docker-compose.local-inference.yml (for llama.cpp + TEI).
#
# Only include this file when running on a machine with an NVIDIA GPU.
#
# Usage (TEI embeddings only):
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.gpu.yml \
#     --profile local-embeddings up -d
#
# Usage (full local inference stack):
#   docker compose -f docker/docker-compose.yml \
#     -f docker/docker-compose.local-inference.yml \
#     -f docker/docker-compose.gpu.yml \
#     --profile local-inference up -d

services:
  embeddings:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # llama.cpp GPU override — only meaningful when layered on top of
  # docker-compose.local-inference.yml. The `command:` is duplicated from the
  # base override because compose replaces (not appends) command fields, and
  # `-ngl 999` is required to actually offload layers to the GPU.
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    command: >
      -hf ${LLAMA_CPP_MODEL:?LLAMA_CPP_MODEL must be set to a HuggingFace GGUF repo (e.g. unsloth/Qwen2.5-7B-Instruct-GGUF:Q4_K_M)}
      --host 0.0.0.0
      --port 8000
      --ctx-size ${LLAMA_CPP_CONTEXT_SIZE:-8192}
      --jinja
      -ngl 999
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
