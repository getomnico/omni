  query: What do the auricles do?
  task_family: current_state
  temporal_type: none
  reference_answer: help direct microscopic prey toward the mouth
  reference_doc_ids:
  - /data/eval-corpus/21a862172223.txt
  context_chunks:
  - text: The Lobata have a pair of lobes, which are muscular, cuplike extensions
      of the body that project beyond the mouth. Their inconspicuous tentacles originate
      from the corners of the mouth, running in convoluted grooves and spreading out
      over the inner surface of the lobes (rather than trailing far behind, as in
      the Cydippida). Between the lobes on either side of the mouth, many species
      of lobates have four auricles, gelatinous projections edged with cilia that
      produce water currents that help direct microscopic prey toward the mouth. This
      combination of structures enables lobates to feed continuously on suspended
      planktonic prey.
